name: Instagram scraper pipeline

# Runs only Instagram → enrich → Jummah → target JSON + mobile seed (same committed
# artifacts as the tail of the daily pipeline). Use when you want a fresh IG pass
# without re-scraping every masjid website or Gmail.
#
# Commits: target_masjids_*.json, safar-mobile/assets/seed-*.json

on:
  workflow_dispatch:
    inputs:
      fast_mode:
        description: "Fast mode? (shorter IG window, lighter enrich OCR)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_scrape:
        description: "Skip Instagram scrape (only enrich + seed from existing JSON on runner cache)?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      ig_usernames:
        description: "Optional comma-separated IG usernames (empty = all mapped accounts)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: instagram-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      SAFAR_FAST_MODE: ${{ github.event.inputs.fast_mode == 'true' && '1' || '0' }}
      SAFAR_SKIP_INSTAGRAM: ${{ github.event.inputs.skip_scrape == 'true' && '1' || '0' }}
      SAFAR_INSTAGRAM_SHARDS: "1"
      SAFAR_INSTAGRAM_SLEEP_SECONDS: "6"
      SAFAR_INSTAGRAM_SHARD_STAGGER_SECONDS: "0"
      IG_ACCOUNT_SLEEP_SECONDS: "30"
      IG_REQUEST_RETRIES: "4"
      IG_BACKOFF_BASE_S: "1.5"
      IG_BACKOFF_CAP_S: "20"
      SAFAR_INSTAGRAM_FORCE_PROXY: "1"
      SAFAR_INSTAGRAM_PROXY_FILE: "instagram_proxies.txt"
      PYTHONUNBUFFERED: "1"
      SAFAR_INSTAGRAM_USERNAMES: ${{ github.event.inputs.ig_usernames }}
      SUPABASE_URL: https://xkpbpwusseaphdhaelbr.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Symlink legacy /Users/shaheersaud/Safar path
        run: |
          sudo mkdir -p /Users/shaheersaud
          sudo ln -sfn "$GITHUB_WORKSPACE" /Users/shaheersaud/Safar
          ls -la /Users/shaheersaud/Safar | head -3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install system packages (tesseract for OCR)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright==1.58.0 pillow==12.1.1

      - name: Install Playwright browser (Chromium only)
        run: |
          python -m playwright install --with-deps chromium

      - name: Restore scraper caches
        uses: actions/cache@v4
        with:
          path: |
            events_by_masjid
            instagram
          key: safar-ig-caches-${{ github.run_id }}
          restore-keys: |
            safar-caches-
            safar-ig-caches-

      - name: Prepare Instagram proxy file (Webshare or Proxifly CDN)
        env:
          WEBSHARE_PROXIES: ${{ secrets.WEBSHARE_PROXIES }}
        run: |
          OUT="instagram_proxies.txt"
          if [ -n "${WEBSHARE_PROXIES:-}" ]; then
            printf '%s\n' "$WEBSHARE_PROXIES" > "$OUT"
            echo "proxy lines (Webshare): $(grep -c . "$OUT" || true)"
          else
            echo "::warning::WEBSHARE_PROXIES empty — fetching Proxifly public HTTP proxy list into $OUT."
            python proxifly_fetch.py --out "$OUT" --max 50
          fi

      - name: Run Instagram-only pipeline
        run: |
          python safar_instagram_pipeline.py

      - name: Verify Supabase sync summary exists
        run: |
          LATEST="$(ls -1t events_by_masjid/_reports/supabase_sync_summary_*.json 2>/dev/null | head -1 || true)"
          if [ -z "$LATEST" ]; then
            echo "::error::Supabase sync summary missing (events_by_masjid/_reports/supabase_sync_summary_*.json)."
            echo "::error::Check SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY secrets and sync_supabase_events.py logs."
            exit 1
          fi
          echo "Latest Supabase summary: $LATEST"
          python - <<'PY'
          import json,glob
          latest=sorted(glob.glob("events_by_masjid/_reports/supabase_sync_summary_*.json"))[-1]
          d=json.load(open(latest))
          print("rows_upserted:", d.get("rows_upserted"), "batch_id:", d.get("batch_id"))
          PY

      - name: Show resulting counts
        if: always()
        run: |
          echo "--- target_masjids_events.json ---"
          python -c "import json; d=json.load(open('target_masjids_events.json')); print('total events:', len(d))"
          echo "--- target_masjids_future_events.json ---"
          python -c "import json; d=json.load(open('target_masjids_future_events.json')); print('future events:', len(d))"
          echo "--- seed ---"
          ls -l safar-mobile/assets/seed-events.json safar-mobile/assets/seed-meta.json || true

      - name: Upload pipeline report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-pipeline-report-${{ github.run_id }}
          path: |
            events_by_masjid/_reports/
          retention-days: 14
          if-no-files-found: warn

      - name: Commit refreshed data back to main
        run: |
          git config user.name  "safar-bot"
          git config user.email "safar-bot@users.noreply.github.com"

          git add \
            target_masjids_events.json \
            target_masjids_future_events.json \
            target_masjids_future_events_detailed.json \
            safar-mobile/assets/seed-events.json \
            safar-mobile/assets/seed-meta.json || true

          if git diff --cached --quiet; then
            echo "No data changes to commit — pipeline produced identical output."
            exit 0
          fi

          git commit -m "chore(data): Instagram pipeline refresh $(date -u +%Y-%m-%d) [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing onto latest main"
            git fetch origin main
            git rebase origin/main || { echo "Rebase conflict — aborting"; git rebase --abort || true; exit 1; }
            sleep $((attempt * 2))
          done
          echo "Could not push after 5 attempts"
          exit 1
